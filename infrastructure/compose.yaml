services:
  db:
    image: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
    ports:
      - 3306:3306
    volumes:
      - ./bbdd/data:/var/lib/mysql
    networks: 
      - node-network
  
  backend:
    build: 
      context: ../server
    networks: 
      - node-network
    volumes: 
      - /project/node_modules
      - ./certs:/infrastructure/certs
    tty: true
    ports: 
      - "3003:3003"
    command: npm run start
    depends_on:
       - db

  frontend:
    build:
      context: ../front/admin-casademiranda
    ports:
      - 3000:3000
    volumes:
      - /project/node_modules
    networks:
      - node-network
    command: npm run start
    depends_on:
      - backend


  nginx:
    build: 
      context: nginx
    container_name: nginx
    restart: always
    tty: true
    ports: 
      - "8000:80"
    networks: 
      - node-network
    depends_on:
       - backend
       - frontend
       
networks:
  node-network:
    driver: bridge
