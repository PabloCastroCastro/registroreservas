services:
  db:
    image: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
    ports:
      - 3306:3306
    volumes:
      - ./bbdd/data:/var/lib/mysql
    networks: 
      - node-network
  
  backend:
    build: 
      context: ../server
    networks: 
      - node-network
    volumes: 
      - /project/node_modules
      - ./certs:/infrastructure/certs
      - ./check-in:/server/check-in
    tty: true
    ports: 
      - "3003:3003"
    command: npm run start
    depends_on:
       - db

  frontend:
    build:
      context: ../front/admin-casademiranda
      args:
        - NEXT_PUBLIC_API_HOST=${API_HOST}
    ports:
      - 3000:3000
    volumes:
      - /project/node_modules
    networks:
      - node-network
    command: npm run serve
    depends_on:
      - backend


  nginx:
    build:
      context: nginx
    container_name: nginx
    restart: always
    tty: true
    environment:
      - API_HOST=${API_HOST}
    ports:
      - "80:80"
      - "443:443"
    networks: 
      - node-network
    volumes: 
      - ./certs:/etc/nginx/infrastructure/certs
    depends_on:
       - backend
       - frontend
       
networks:
  node-network:
    driver: bridge
